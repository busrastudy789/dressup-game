<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dress-Up Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>✨ Dress-Up Game</h1>

  <div class="game-container">

    <!-- LEFT: Category buttons -->
    <div class="sidebar">
      <h2>Outfits</h2>
      <div id="category-buttons"></div>
      <button id="reset-btn" onclick="resetOutfit()">Reset All</button>
    </div>

    <!-- MIDDLE: The character display -->
    <div class="character-area">
      <div id="character">
        <!-- Base body layer -->
        <img id="base-body" src="images/base/body.png" alt="character body" />
        <!-- Clothing layers stack on top -->
        <img id="layer-tops"        class="clothing-layer" src="" alt="" />
        <img id="layer-bottoms"     class="clothing-layer" src="" alt="" />
        <img id="layer-shoes"       class="clothing-layer" src="" alt="" />
        <img id="layer-hats"        class="clothing-layer" src="" alt="" />
        <img id="layer-accessories" class="clothing-layer" src="" alt="" />
      </div>
    </div>

    <!-- RIGHT: Item picker panel -->
    <div class="picker-panel">
      <h2 id="picker-title">Pick a category</h2>
      <div id="item-grid"></div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
